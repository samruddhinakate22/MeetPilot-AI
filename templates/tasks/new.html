{% extends "base.html" %}
{% block title %}New Task{% endblock %}
{% block content %}

<div class="page-header">
  <div>
    <h1>Add Task</h1>
    <p>Create a task and assign it to a team member</p>
  </div>
  <a href="{{ url_for('tasks.list_tasks') }}" class="btn btn-secondary">← Back</a>
</div>

{% if current_user.role != 'admin' %}
  <div style="background:var(--red-bg);border:1px solid rgba(255,107,107,0.3);border-radius:var(--radius-sm);padding:16px;color:var(--red);font-size:14px;">
    ⛔ Only admins can create tasks. Contact your admin to add tasks.
  </div>
{% else %}
<div style="max-width:660px;">
  <form method="POST">
    <div class="card" style="display:flex;flex-direction:column;gap:18px;">

      <div class="form-group" style="margin-bottom:0;">
        <label>Task Description *</label>
        <textarea name="description" rows="3" placeholder="Describe the task clearly…" required></textarea>
      </div>

      <div class="form-group" style="margin-bottom:0;">
        <label>Notes / Context</label>
        <textarea name="notes" rows="2" placeholder="Additional context or instructions (optional)"></textarea>
      </div>

      <div class="grid-2">
        <div class="form-group" style="margin-bottom:0;">
          <label>Assign To</label>
          <select name="assigned_to">
            <option value="">— Unassigned —</option>
            {% for user in users %}
              <option value="{{ user.id }}">{{ user.name }} ({{ user.role }})</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label>Linked Meeting</label>
          <select name="meeting_id">
            <option value="">— None —</option>
            {% for m in meetings %}
              <option value="{{ m.id }}">{{ m.title[:40] }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label>Deadline</label>
          <input type="date" name="deadline">
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label>Priority</label>
          <select name="priority">
            <option value="low">🟢 Low</option>
            <option value="medium" selected>🟡 Medium</option>
            <option value="high">🔴 High</option>
          </select>
        </div>
      </div>

      <!-- Email notification toggle -->
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;">
        <label style="display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:0;">
          <input type="checkbox" name="send_email" style="width:18px;height:18px;accent-color:var(--accent);" checked>
          <div>
            <div style="font-size:14px;font-weight:600;color:var(--text);">📧 Send email notification</div>
            <div style="font-size:12px;color:var(--text3);">Notify the assigned member by email (requires email config in .env)</div>
          </div>
        </label>
      </div>

      <button type="submit" class="btn btn-primary btn-lg" style="align-self:flex-start;">
        Create Task →
      </button>
    </div>
  </form>
</div>
{% endif %}

{% endblock %}
